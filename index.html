<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>Quiz game</title>
  </head>
  <body>
    <div class="container">
      <div id="start-screen" class="screen active">
        <h1>Quiz Time</h1>
        <p>Test Your Knowledge with These fun Questions</p>
        <button id="start-btn" class="start-btn btn">Start Quiz</button>
      </div>

      <div class="screen" id="quiz-screen">
        <div class="quiz-header">
          <h2 id="question-text">Question goes here</h2>
          <div class="quiz-info">
            <p>
              Question <span id="current-question">1</span> of
              <span id="total-questions">5</span>
            </p>
            <p>Score: <span id="score">0</span></p>
          </div>

          <div class="answers-container" id="answers-container">
            <!-- Answer buttons will be generated here from JavaScript -->
          </div>

          <div class="progress-bar">
            <div class="progress" id="progress"></div>
          </div>
        </div>
      </div>

      <div class="screen" id="result-screen">
        <h1>Quiz Completed!</h1>
        <div class="result-infor">
          <p>
            Your final score is: <span id="final-score">0</span> out of
            <span id="max-score">5</span>
          </p>
          <div id="result-message">tell player thier result</div>
        </div>
        <button id="restart-btn" class="restart-btn btn">Restart Quiz</button>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
